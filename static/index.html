<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3148;
      --accent: #6366f1;
      --accent-h: #818cf8;
      --green: #22c55e;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      display: flex;
      align-items: center;
      padding: 18px 40px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    nav .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent-h);
      letter-spacing: -0.5px;
    }
    nav .logo span { color: var(--text); }

    /* LAYOUT */
    main { max-width: 900px; margin: 48px auto; padding: 0 24px; }

    /* SHORTEN CARD */
    .shorten-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px;
      margin-bottom: 40px;
    }
    .shorten-card h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .shorten-card p { color: var(--muted); margin-bottom: 24px; font-size: .95rem; }

    .input-row {
      display: flex;
      gap: 12px;
    }
    .input-row input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }
    .input-row input:focus { border-color: var(--accent); }
    .input-row input::placeholder { color: var(--muted); }

    button {
      cursor: pointer;
      font-size: .95rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      padding: 14px 28px;
      background: var(--accent);
      color: #fff;
      transition: background .2s, transform .1s;
      white-space: nowrap;
    }
    button:hover { background: var(--accent-h); }
    button:active { transform: scale(.97); }
    button:disabled { opacity: .5; cursor: not-allowed; }

    /* RESULT */
    .result-box {
      margin-top: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      display: none;
      align-items: center;
      gap: 12px;
    }
    .result-box.show { display: flex; }
    .result-box a {
      flex: 1;
      color: var(--accent-h);
      text-decoration: none;
      font-weight: 600;
      font-size: 1.05rem;
      word-break: break-all;
    }
    .result-box a:hover { text-decoration: underline; }
    .copy-btn {
      padding: 10px 18px;
      font-size: .85rem;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .copy-btn:hover { background: var(--border); }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--green);
      color: #fff;
      padding: 12px 22px;
      border-radius: 10px;
      font-weight: 600;
      font-size: .9rem;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* TABLE SECTION */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-header h2 { font-size: 1.1rem; font-weight: 600; }
    .refresh-btn {
      padding: 8px 16px;
      font-size: .82rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .refresh-btn:hover { color: var(--text); }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th {
      text-align: left;
      padding: 14px 18px;
      color: var(--muted);
      font-weight: 500;
      font-size: .82rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    .short-link { color: var(--accent-h); text-decoration: none; font-weight: 600; }
    .short-link:hover { text-decoration: underline; }
    .orig-url {
      max-width: 280px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--muted);
      font-size: .85rem;
    }
    .badge {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: .8rem;
      color: var(--text);
      font-weight: 600;
    }
    .detail-btn {
      padding: 7px 14px;
      font-size: .8rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .detail-btn:hover { color: var(--text); border-color: var(--accent); }

    /* MODAL */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 640px;
      max-width: 95vw;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .modal-header h3 { font-size: 1.1rem; font-weight: 700; }
    .close-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 1.5rem;
      padding: 4px 10px;
      line-height: 1;
    }
    .close-btn:hover { color: var(--text); background: var(--surface2); border-radius: 6px; }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }
    .stat-card .num { font-size: 1.8rem; font-weight: 700; color: var(--accent-h); }
    .stat-card .label { font-size: .8rem; color: var(--muted); margin-top: 4px; }

    .analytics-list { display: flex; flex-direction: column; gap: 10px; }
    .analytics-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: .82rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .analytics-item strong { color: var(--text); }

    .empty { text-align: center; color: var(--muted); padding: 40px; font-size: .95rem; }

    @media (max-width: 600px) {
      .input-row { flex-direction: column; }
      nav { padding: 16px 20px; }
      main { margin: 24px auto; }
      .shorten-card { padding: 24px; }
      .stat-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">⚡ short<span>ly</span></div>
</nav>

<main>
  <!-- Shorten Card -->
  <div class="shorten-card">
    <h1>Shorten any URL</h1>
    <p>Paste your long link and get a clean, shareable short URL instantly.</p>
    <div class="input-row">
      <input id="urlInput" type="url" placeholder="https://your-very-long-url.com/goes/here" />
      <button id="shortenBtn" onclick="shortenURL()">Shorten →</button>
    </div>
    <div class="result-box" id="resultBox">
      <a id="resultLink" href="#" target="_blank"></a>
      <button class="copy-btn" onclick="copyLink()">Copy</button>
    </div>
  </div>

  <!-- URL Table -->
  <div class="section-header">
    <h2>All Links</h2>
    <button class="refresh-btn" onclick="loadURLs()">↻ Refresh</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Short Link</th>
          <th>Original URL</th>
          <th>Clicks</th>
          <th>Created</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="urlTable">
        <tr><td colspan="5" class="empty">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Analytics Modal -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Analytics</h3>
      <button class="close-btn" onclick="closeModalDirect()">×</button>
    </div>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="num" id="statClicks">—</div>
        <div class="label">Total Clicks</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statCreated">—</div>
        <div class="label">Created</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statCode">—</div>
        <div class="label">Short Code</div>
      </div>
    </div>
    <h4 style="font-size:.85rem;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em">Recent Clicks</h4>
    <div class="analytics-list" id="analyticsList"></div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
  const BASE = '';

  async function shortenURL() {
    const input = document.getElementById('urlInput');
    const btn = document.getElementById('shortenBtn');
    const url = input.value.trim();
    if (!url) return;

    btn.disabled = true;
    btn.textContent = 'Shortening…';

    try {
      const res = await fetch(`${BASE}/api/shorten`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const data = await res.json();
      if (!res.ok) { alert(data.error || 'Error'); return; }

      const box = document.getElementById('resultBox');
      const link = document.getElementById('resultLink');
      link.href = data.short_url;
      link.textContent = data.short_url;
      box.classList.add('show');
      loadURLs();
    } catch (e) {
      alert('Network error: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Shorten →';
    }
  }

  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') shortenURL();
  });

  function copyLink() {
    const url = document.getElementById('resultLink').textContent;
    navigator.clipboard.writeText(url).then(() => showToast('Copied!'));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  async function loadURLs() {
    const tbody = document.getElementById('urlTable');
    try {
      const res = await fetch(`${BASE}/api/urls`);
      const urls = await res.json();

      if (!urls.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty">No links yet — shorten your first URL above!</td></tr>';
        return;
      }

      tbody.innerHTML = urls.map(u => {
        const shortURL = `${location.origin}/${u.short_code}`;
        const created = new Date(u.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const orig = u.original_url.length > 50 ? u.original_url.slice(0, 50) + '…' : u.original_url;
        return `<tr>
          <td><a class="short-link" href="${shortURL}" target="_blank">/${u.short_code}</a></td>
          <td><span class="orig-url" title="${u.original_url}">${orig}</span></td>
          <td><span class="badge">${u.clicks}</span></td>
          <td style="color:var(--muted);font-size:.85rem">${created}</td>
          <td><button class="detail-btn" onclick="openModal('${u.short_code}')">Analytics</button></td>
        </tr>`;
      }).join('');
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="5" class="empty">Failed to load — is the server running?</td></tr>`;
    }
  }

  async function openModal(shortCode) {
    document.getElementById('modalBackdrop').classList.add('show');
    document.getElementById('modalTitle').textContent = `/${shortCode}`;
    document.getElementById('statCode').textContent = shortCode;
    document.getElementById('statClicks').textContent = '…';
    document.getElementById('statCreated').textContent = '…';
    document.getElementById('analyticsList').innerHTML = '<div class="empty">Loading…</div>';

    const [statsRes, analyticsRes] = await Promise.all([
      fetch(`${BASE}/api/stats/${shortCode}`),
      fetch(`${BASE}/api/analytics/${shortCode}`)
    ]);
    const stats = await statsRes.json();
    const analytics = await analyticsRes.json();

    document.getElementById('statClicks').textContent = stats.clicks ?? 0;
    document.getElementById('statCreated').textContent =
      new Date(stats.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

    const list = document.getElementById('analyticsList');
    if (!analytics.length) {
      list.innerHTML = '<div class="empty">No clicks recorded yet.</div>';
    } else {
      list.innerHTML = analytics.map(a => {
        const time = new Date(a.clicked_at).toLocaleString();
        const ua = a.user_agent ? a.user_agent.slice(0, 60) + (a.user_agent.length > 60 ? '…' : '') : 'Unknown';
        return `<div class="analytics-item">
          <strong>${time}</strong><br>
          IP: ${a.ip_address || '—'} &nbsp;·&nbsp; ${ua}
          ${a.referrer ? `<br>Ref: ${a.referrer}` : ''}
        </div>`;
      }).join('');
    }
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalBackdrop')) closeModalDirect();
  }
  function closeModalDirect() {
    document.getElementById('modalBackdrop').classList.remove('show');
  }

  // Initial load
  loadURLs();
</script>
</body>
</html>
